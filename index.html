<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rumbling Nomad">
<meta name="theme-color" content="#0f0f0f">
<title>Rumbling Nomad</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --asphalt:#0f0f0f;--asphalt-2:#1a1a1a;--asphalt-3:#242424;--asphalt-4:#2e2e2e;
  --amber:#f59e0b;--amber-dim:#92600a;--ember:#ef4444;
  --smoke:#888;--smoke-light:#bbb;--white:#f5f5f0;
  --green:#22c55e;--purple:#a78bfa;--blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;background:var(--asphalt);color:var(--white);font-family:'Barlow',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto}
.app-header{padding:10px 14px 6px;background:var(--asphalt);border-bottom:1px solid var(--asphalt-3);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.08em;color:var(--amber);line-height:1}
.header-left p{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--smoke);letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
.header-actions{display:flex;gap:6px}
.hbtn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:5px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--asphalt-4);background:transparent;color:var(--smoke)}
.hbtn.primary{background:var(--amber);color:var(--asphalt);border-color:var(--amber)}
.nav-tabs{display:flex;background:var(--asphalt-2);border-bottom:1px solid var(--asphalt-3);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:9px 13px;white-space:nowrap;cursor:pointer;color:var(--smoke);border-bottom:2px solid transparent;flex-shrink:0}
.nav-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.panel{display:none;padding:12px 12px 90px;height:0;overflow:hidden}
.panel.active{display:block;height:auto;overflow:visible}
.bottom-nav{display:flex;background:var(--asphalt-2);border-top:1px solid var(--asphalt-3);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 4px;cursor:pointer;color:var(--smoke)}
.bnav-item.active{color:var(--amber)}
.bnav-icon{font-size:18px;line-height:1;margin-bottom:1px}
.bnav-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.day-card{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:10px;margin-bottom:10px;overflow:hidden}
.day-card.hl{border-left:3px solid var(--amber)}
.day-card.devil{border-left:3px solid var(--ember)}
.card-header{padding:10px 12px 8px;display:flex;align-items:center;gap:8px;cursor:pointer}
.card-header:active{background:var(--asphalt-3)}
.card-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke);min-width:50px;flex-shrink:0}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--white);flex:1;line-height:1.2}
.card-miles{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--smoke);white-space:nowrap}
.card-chev{color:var(--smoke);font-size:11px;transition:transform .2s;flex-shrink:0}
.card-body{display:none;padding:0 12px 12px;border-top:1px solid var(--asphalt-3)}
.card-body.open{display:block}
.stops-list{padding-top:8px}
.stop-item{display:flex;gap:8px;padding-bottom:8px}
.stop-left{display:flex;flex-direction:column;align-items:center;width:12px;flex-shrink:0}
.stop-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.stop-line{width:1px;background:var(--asphalt-4);flex:1;margin-top:3px;min-height:10px}
.stop-item:last-child .stop-line{display:none}
.stop-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;color:var(--white);line-height:1.3}
.stop-note{font-size:12px;color:var(--smoke);line-height:1.4;margin-top:1px;font-weight:300}
.hotel-row{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--asphalt-3);font-size:12px;color:var(--smoke);line-height:1.5;margin-top:4px}
.mileage-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--asphalt-3);margin-top:6px}
.mileage-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--smoke);flex-shrink:0}
.mileage-input{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:5px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;padding:5px 8px;width:90px;outline:none;text-align:center}
.mileage-input:focus{border-color:var(--amber-dim)}
.mileage-unit{font-size:12px;color:var(--smoke)}
.mileage-total{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--amber);margin-left:auto}
.weather-card{background:var(--asphalt-3);border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.weather-icon{font-size:28px;flex-shrink:0}
.weather-info{flex:1}
.weather-loc{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--white)}
.weather-desc{font-size:12px;color:var(--smoke);margin-top:1px}
.weather-temps{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber);letter-spacing:.02em;flex-shrink:0}
.weather-loading{font-size:12px;color:var(--smoke);padding:8px 0}
.weather-section{margin-bottom:12px}
.weather-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--smoke);margin-bottom:6px}
.photo-section{margin-top:10px;border-top:1px solid var(--asphalt-3);padding-top:10px}
.photo-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;cursor:pointer;background:var(--asphalt-3)}
.photo-thumb:active{opacity:.7}
.photo-add-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;background:transparent;border:1px dashed var(--asphalt-4);border-radius:6px;color:var(--smoke);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}
.photo-add-btn:active{border-color:var(--amber);color:var(--amber)}
.photo-input{display:none}
.photo-count{font-size:11px;color:var(--smoke)}
.photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
.photo-viewer.open{display:flex}
.photo-viewer-img{max-width:100%;max-height:75vh;object-fit:contain;border-radius:4px}
.photo-viewer-actions{display:flex;gap:10px;margin-top:16px;padding:0 16px}
.photo-viewer-caption{font-size:13px;color:var(--smoke-light);margin-top:8px;text-align:center;padding:0 20px;line-height:1.5}
.pv-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:4px}
.share-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border:none}
.share-btn.fb{background:#1877f2;color:#fff}
.share-btn.native{background:var(--asphalt-3);border:1px solid var(--asphalt-4);color:var(--white)}
.share-btn.copy{background:var(--asphalt-3);border:1px solid var(--asphalt-4);color:var(--white)}
.edit-field{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:6px;color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 10px;width:100%;outline:none;margin-bottom:6px}
.edit-field:focus{border-color:var(--amber-dim)}
textarea.edit-field{resize:none;min-height:58px;line-height:1.5}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke);margin-bottom:3px;margin-top:8px}
.field-label:first-child{margin-top:10px}
.field-row{display:flex;gap:6px}
.field-row .edit-field{margin-bottom:0}
.small-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:7px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--asphalt-4);background:transparent;color:var(--smoke);white-space:nowrap;flex-shrink:0}
.small-btn.amber{background:var(--amber);color:var(--asphalt);border-color:var(--amber)}
.small-btn.red{border-color:#450a0a;color:var(--ember)}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;background:transparent;border:1px dashed var(--asphalt-4);border-radius:6px;color:var(--smoke);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;width:100%;margin-top:4px}
.add-row-btn:active{border-color:var(--amber);color:var(--amber)}
.edit-day-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;background:transparent;border:1px solid var(--asphalt-4);border-radius:6px;color:var(--smoke);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;margin-top:10px}
.intro-card{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-top:3px solid var(--amber);border-radius:10px;padding:12px;margin-bottom:12px}
.intro-route{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.03em;color:var(--white);line-height:1}
.intro-route span{color:var(--amber)}
.intro-dates{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--smoke);margin-top:3px}
.intro-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.intro-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;padding:2px 7px;border:1px solid var(--asphalt-4);border-radius:3px;color:var(--smoke-light);text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.stat{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:8px;padding:8px 10px}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--smoke);margin-bottom:2px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber);line-height:1}
.tip{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:8px;padding:9px 11px;margin-bottom:7px;font-size:13px;color:var(--smoke-light);line-height:1.6;font-weight:300}
.tip b{font-weight:500;color:var(--white)}
.tip.critical{border-left:3px solid var(--ember)}
.tip.good{border-left:3px solid var(--green)}
.tip.info{border-left:3px solid var(--blue)}
.timeline{display:flex;border-radius:4px;overflow:hidden;margin-bottom:12px;height:22px}
.tseg{display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:0 4px}
.sec-header{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.05em;color:var(--white);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.check-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.check-tab{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--asphalt-4);border-radius:20px;cursor:pointer;color:var(--smoke);background:transparent}
.check-tab.active{background:var(--amber);color:var(--asphalt);border-color:var(--amber)}
.check-panel{display:none}.check-panel.active{display:block}
.check-section{margin-bottom:14px}
.check-sec-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--asphalt-3)}
.check-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--asphalt-3);cursor:pointer;-webkit-user-select:none;user-select:none}
.check-item:last-child{border-bottom:none}
.check-box{width:19px;height:19px;border:1.5px solid var(--asphalt-4);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check-box.done{background:var(--amber);border-color:var(--amber)}
.check-box.done::after{content:'✓';font-size:11px;color:var(--asphalt);font-weight:700}
.check-label{flex:1;font-size:13px;color:var(--white);line-height:1.4}
.check-label.done{color:var(--smoke);text-decoration:line-through}
.check-note{font-size:11px;color:var(--smoke);margin-top:2px;line-height:1.4;font-weight:300;display:block}
.check-del{background:transparent;border:none;color:var(--asphalt-4);font-size:15px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;margin-top:1px}
.check-del:active{color:var(--ember)}
.progress-wrap{background:var(--asphalt-2);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--smoke-light)}
.progress-track{height:3px;background:var(--asphalt-4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .3s;width:0%}
.reset-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--asphalt-4);border-radius:20px;background:transparent;color:var(--smoke);cursor:pointer}
.add-check-row{display:flex;gap:6px;margin-top:8px}
.add-check-row .edit-field{margin-bottom:0;flex:1}
.stop-edit-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px;background:var(--asphalt-3);border-radius:6px;padding:8px}
.stop-edit-inputs{flex:1;display:flex;flex-direction:column;gap:4px}
.stop-edit-inputs .edit-field{margin-bottom:0;background:var(--asphalt-4)}
.stop-del-btn{background:transparent;border:none;color:var(--smoke);font-size:18px;cursor:pointer;padding:2px 0;line-height:1;flex-shrink:0;margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--asphalt-2);border-top:1px solid var(--asphalt-3);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:16px 16px calc(16px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;color:var(--amber);margin-bottom:12px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions .small-btn{flex:1;text-align:center}
.share-url{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:6px;padding:10px;font-size:12px;color:var(--smoke-light);word-break:break-all;line-height:1.5;margin:10px 0;font-family:monospace}
.trip-item{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px}
.trip-item:active{border-color:var(--amber)}
.trip-info{flex:1}
.trip-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--white)}
.trip-meta{font-size:12px;color:var(--smoke);margin-top:2px}
.trip-arrow{color:var(--smoke);font-size:18px}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.04em;padding:2px 5px;border-radius:3px;text-transform:uppercase;display:inline-block;margin-left:4px;vertical-align:middle}
.b-critical{background:#450a0a;color:#ef4444}
.ai-chat-wrap{display:flex;flex-direction:column;height:100%;height:100dvh}
.ai-chat-header{padding:10px 14px;background:var(--asphalt);border-bottom:1px solid var(--asphalt-3);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-chat-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;color:var(--amber);flex:1}
.ai-chat-messages{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;min-height:0}
.ai-msg{max-width:88%;border-radius:12px;padding:10px 13px;font-size:14px;line-height:1.6}
.ai-msg.user{align-self:flex-end;background:var(--amber);color:var(--asphalt);border-bottom-right-radius:3px;font-weight:500}
.ai-msg.assistant{align-self:flex-start;background:var(--asphalt-2);border:1px solid var(--asphalt-3);color:var(--white);border-bottom-left-radius:3px}
.ai-msg.assistant b{font-weight:600;color:var(--amber)}
.ai-msg.thinking{align-self:flex-start;background:var(--asphalt-2);border:1px solid var(--asphalt-3);color:var(--smoke);font-style:italic}
.ai-chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--asphalt-3);background:var(--asphalt);flex-shrink:0;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.ai-chat-input{flex:1;background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:20px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;padding:9px 14px;outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4}
.ai-chat-input:focus{border-color:var(--amber-dim)}
.ai-send-btn{background:var(--amber);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;color:var(--asphalt)}
.ai-send-btn:active{opacity:.7}
.ai-import-btn{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:12px;border-radius:8px;cursor:pointer;border:none;background:var(--amber);color:var(--asphalt);margin-top:8px}
.ai-import-btn:active{opacity:.8}
.ai-starter{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 10px}
.ai-starter-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;padding:6px 12px;border:1px solid var(--asphalt-3);border-radius:20px;background:transparent;color:var(--smoke);cursor:pointer;text-align:left}
.ai-starter-btn:active{border-color:var(--amber);color:var(--amber)}
.journal-day{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:10px;margin-bottom:10px;overflow:hidden}
.journal-day-header{padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--asphalt-3)}
.journal-day-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke)}
.journal-day-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--white);flex:1}
.journal-day-body{padding:10px 12px 12px}
.journal-odometer{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--asphalt-3)}
.odo-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--smoke)}
.odo-input{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:5px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:18px;padding:4px 8px;width:100px;outline:none;text-align:center;letter-spacing:.04em}
.odo-input:focus{border-color:var(--amber-dim)}
.odo-unit{font-size:12px;color:var(--smoke)}

function detectTodayDayId(data){
  var now=new Date(),allDays=getAllDays(data);
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var nm=months[now.getMonth()],nd=now.getDate();
  for(var i=0;i<allDays.length;i++){var d=allDays[i];if(d.date&&d.date.indexOf(nm)!==-1){var m=d.date.match(/(\d+)/);if(m&&parseInt(m[1])===nd)return d.id;}}
  return allDays.length?allDays[0].id:null;
}
function getAllDays(data){var days=[];data.sections.forEach(function(sec){sec.days.forEach(function(day){days.push(day);});});return days;}
function getDayById(data,dayId){var all=getAllDays(data);return all.find(function(d){return d.id===dayId;})||all[0];}
function parseDayRoute(day){
  var title=day.title||'',parts=title.split('→');
  if(parts.length<2)parts=title.split('->');
  var origin=(parts[0]||'').trim().replace(/[^\w\s,]/g,'').trim();
  var dest=(parts[parts.length-1]||'').trim().replace(/[^\w\s,]/g,'').trim();
  return{origin:origin,dest:dest};
}
function stopTrackingRide(){
  if(RIDE.watchId!==null){try{navigator.geolocation.clearWatch(RIDE.watchId);}catch(ex){}RIDE.watchId=null;}
  RIDE.autoTracking=false;
}
function renderRide(data){
  stopTrackingRide();
  var el=document.getElementById('panel-ride');if(!el)return;
  if(!RIDE.activeDayId)RIDE.activeDayId=detectTodayDayId(data);
  var allDays=getAllDays(data),activeDay=getDayById(data,RIDE.activeDayId);
  var pillsHtml=allDays.map(function(day){
    var s=day.title?day.title.split('→').pop().trim().split(',')[0].trim():day.date;
    if(s.length>16)s=s.substring(0,14)+'…';
    return '<div class="ride-day-pill'+(day.id===RIDE.activeDayId?' active':'')+'" data-dayid="'+e(day.id)+'">'+e(s)+'</div>';
  }).join('');
  var stopsHtml='';
  if(activeDay&&activeDay.stops){activeDay.stops.forEach(function(s,i){stopsHtml+='<div class="ride-stop-row" id="rsr-'+i+'"><div class="ride-stop-indicator" style="background:'+e(s.c||'#888')+'"></div><div><div class="ride-stop-name">'+e(s.n)+'</div>'+(s.t?'<div class="ride-stop-note">'+e(s.t)+'</div>':'')+'</div></div>';});}
  var dayTitle=activeDay?activeDay.title:'Select a Day',dayMiles=activeDay?(activeDay.miles||''):'';
  el.innerHTML='<div style="display:flex;flex-direction:column;padding-bottom:90px"><div class="ride-map-wrap"><div id="ride-map"></div><div class="ride-map-loading" id="ride-map-loading"><div class="spinner"></div><div>Loading route…</div></div></div><div class="ride-info"><div class="ride-day-selector" id="ride-day-selector">'+pillsHtml+'</div><div class="ride-gps-row"><div class="ride-gps-dot off" id="ride-gps-dot"></div><div class="ride-gps-text" id="ride-gps-text">GPS off — tap <span>Track Me</span> to start</div></div><div class="ride-progress-card"><div class="ride-progress-header"><div class="ride-progress-title">'+e(dayTitle)+'</div><div class="ride-progress-pct" id="ride-pct">--%</div></div><div class="ride-progress-bar-wrap"><div class="ride-progress-bar" id="ride-bar"></div></div><div class="ride-progress-stats"><div class="ride-stat"><div class="ride-stat-val" id="ride-miles-done">--</div><div class="ride-stat-lbl">Mi Done</div></div><div class="ride-stat"><div class="ride-stat-val" id="ride-miles-left">--</div><div class="ride-stat-lbl">Mi Left</div></div><div class="ride-stat"><div class="ride-stat-val" id="ride-total-mi">'+(dayMiles||'--')+'</div><div class="ride-stat-lbl">Day Total</div></div></div></div><div class="ride-next-stop" id="ride-next-stop" style="display:none"><div class="ride-next-label">▶ Next Stop</div><div class="ride-next-name" id="ride-next-name"></div><div class="ride-next-note" id="ride-next-note"></div></div><div class="ride-actions"><button class="ride-btn amber" id="ride-track-btn">📍 Track Me</button><button class="ride-btn" id="ride-center-btn">⊙ Center Map</button></div><div class="ride-stops-mini"><div class="ride-stops-mini-title">Today\'s Stops</div><div id="ride-stops-list">'+stopsHtml+'</div></div></div></div>';
  el.querySelectorAll('.ride-day-pill').forEach(function(pill){tap(pill,function(){RIDE.activeDayId=pill.getAttribute('data-dayid');stopTrackingRide();RIDE.map=null;RIDE.routePath=null;renderRide(data);});});
  tap(document.getElementById('ride-track-btn'),function(){if(RIDE.autoTracking){stopTrackingRide();updateTrackBtn(false);updateGpsStatus(false);}else{startRideTracking(data,activeDay);}});
  tap(document.getElementById('ride-center-btn'),function(){if(RIDE.map&&RIDE.lastLat!==null){RIDE.map.panTo({lat:RIDE.lastLat,lng:RIDE.lastLng});RIDE.map.setZoom(11);}});
  loadGmaps();onGmapsReady(function(){initRideMap(data,activeDay);});
}
function initRideMap(data,day){
  var mapEl=document.getElementById('ride-map');if(!mapEl)return;
  var loading=document.getElementById('ride-map-loading');
  if(!RIDE.map)RIDE.map=new google.maps.Map(mapEl,{zoom:8,center:{lat:46.7,lng:-117.4},mapTypeId:google.maps.MapTypeId.TERRAIN,disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy',mapTypeControl:false});
  var route=parseDayRoute(day);
  if(!route.origin||!route.dest){if(loading)loading.style.display='none';return;}
  if(RIDE.directionsRenderer){RIDE.directionsRenderer.setMap(null);RIDE.directionsRenderer=null;}
  RIDE.directionsRenderer=new google.maps.DirectionsRenderer({suppressMarkers:false,polylineOptions:{strokeColor:'#f59e0b',strokeWeight:6,strokeOpacity:1}});
  RIDE.directionsRenderer.setMap(RIDE.map);
  var svc=new google.maps.DirectionsService(),wpts=[];
  if(day.stops&&day.stops.length>2){for(var i=1;i<day.stops.length-1;i++){var sn=day.stops[i].n.split('—')[0].trim();if(sn&&sn.length>3&&!/fuel|break|overnight|rally|check/i.test(sn))wpts.push({location:sn,stopover:false});}}
  svc.route({origin:route.origin,destination:route.dest,waypoints:wpts.slice(0,3),travelMode:google.maps.TravelMode.DRIVING,optimizeWaypoints:false},function(result,status){
    if(loading)loading.style.display='none';
    if(status==='OK'){RIDE.directionsRenderer.setDirections(result);RIDE.routePath=result.routes[0].overview_path;var totalM=0;result.routes[0].legs.forEach(function(leg){totalM+=leg.distance.value;});RIDE.routeTotalMeters=totalM;var el=document.getElementById('ride-total-mi');if(el)el.textContent=Math.round(totalM/1609.34)+' mi';}
    else{new google.maps.Geocoder().geocode({address:route.origin},function(res,stat){if(stat==='OK'&&res[0]){RIDE.map.setCenter(res[0].geometry.location);RIDE.map.setZoom(9);}});}
  });
}
function startRideTracking(data,day){
  if(!navigator.geolocation){updateGpsStatus(false,'GPS not supported');return;}
  RIDE.autoTracking=true;updateTrackBtn(true);updateGpsStatus(true,'Acquiring GPS…');
  navigator.geolocation.getCurrentPosition(function(pos){handleRidePosition(pos,data,day);},function(err){updateGpsStatus(false,'GPS error: '+err.message);RIDE.autoTracking=false;updateTrackBtn(false);},{enableHighAccuracy:true,timeout:10000});
  RIDE.watchId=navigator.geolocation.watchPosition(function(pos){handleRidePosition(pos,data,day);},function(){updateGpsStatus(false,'GPS signal lost');},{enableHighAccuracy:true,maximumAge:15000,timeout:30000});
}
function handleRidePosition(pos,data,day){
  var lat=pos.coords.latitude,lng=pos.coords.longitude;RIDE.lastLat=lat;RIDE.lastLng=lng;
  updateGpsStatus(true,'Live GPS · updating');
  onGmapsReady(function(){
    if(!RIDE.map)return;
    var ll=new google.maps.LatLng(lat,lng);
    if(!RIDE.userMarker)RIDE.userMarker=new google.maps.Marker({position:ll,map:RIDE.map,title:'You are here',icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#f59e0b',fillOpacity:1,strokeColor:'#0f0f0f',strokeWeight:3},zIndex:999});
    else RIDE.userMarker.setPosition(ll);
    if(RIDE.routePath&&RIDE.routeTotalMeters>0){var p=calcRouteProgress(ll,RIDE.routePath,RIDE.routeTotalMeters);updateProgressUI(p,day);}
    var b=RIDE.map.getBounds();if(!b||!b.contains(ll))RIDE.map.panTo(ll);
  });
}
function calcRouteProgress(userLL,routePath,totalMeters){
  if(!routePath||routePath.length<2)return{pct:0,metersDone:0};
  var min=Infinity,ci=0;
  for(var i=0;i<routePath.length;i++){var d=google.maps.geometry.spherical.computeDistanceBetween(userLL,routePath[i]);if(d<min){min=d;ci=i;}}
  var md=0;for(var j=0;j<ci;j++)md+=google.maps.geometry.spherical.computeDistanceBetween(routePath[j],routePath[j+1]);
  return{pct:Math.min(100,Math.round(md/totalMeters*100)),metersDone:md};
}
function updateProgressUI(progress,day){
  var pct=progress.pct||0,md=Math.round((progress.metersDone||0)/1609.34),total=Math.round(RIDE.routeTotalMeters/1609.34),left=Math.max(0,total-md);
  var bar=document.getElementById('ride-bar'),pctEl=document.getElementById('ride-pct'),doneEl=document.getElementById('ride-miles-done'),leftEl=document.getElementById('ride-miles-left');
  if(bar)bar.style.width=pct+'%';if(pctEl)pctEl.textContent=pct+'%';if(doneEl)doneEl.textContent=md;if(leftEl)leftEl.textContent=left;
  if(day&&day.stops&&day.stops.length>0){
    var seg=100/day.stops.length,ni=Math.min(Math.floor(pct/seg),day.stops.length-1),ns=day.stops[ni];
    var nc=document.getElementById('ride-next-stop'),nn=document.getElementById('ride-next-name'),no=document.getElementById('ride-next-note');
    if(nc&&ns){nc.style.display='block';if(nn)nn.textContent=ns.n;if(no)no.textContent=ns.t||'';}
    day.stops.forEach(function(s,i){var row=document.getElementById('rsr-'+i);if(!row)return;row.classList.remove('passed','current');if(pct>(i/day.stops.length*100)+seg)row.classList.add('passed');else if(i===ni)row.classList.add('current');});
  }
}
function updateGpsStatus(active,msg){
  var dot=document.getElementById('ride-gps-dot'),text=document.getElementById('ride-gps-text');
  if(dot)dot.classList.toggle('off',!active);
  if(text)text.innerHTML=msg||(active?'Live GPS tracking active':'GPS off — tap <span>Track Me</span> to start');
}
function updateTrackBtn(tracking){
  var btn=document.getElementById('ride-track-btn');if(!btn)return;
  if(tracking){btn.textContent='⏹ Stop Tracking';btn.classList.remove('amber');btn.classList.add('tracking');}
  else{btn.innerHTML='📍 Track Me';btn.classList.add('amber');btn.classList.remove('tracking');}
}

function addAIMessage(role,text){
  var msgs=document.getElementById('ai-msgs');if(!msgs)return;
  var div=document.createElement('div');div.className='ai-msg '+role;
  var formatted=text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
  var tripMatch=text.match(/<TRIP>([\s\S]*?)<\/TRIP>/);
  if(tripMatch){
    try{var tripData=JSON.parse(tripMatch[1].trim());AI_PENDING_TRIP=tripData;formatted=formatted.replace(/<TRIP>[\s\S]*?<\/TRIP>/,'');formatted+='<br><br><div style="background:#0f0f0f;border:1px solid #2e2e2e;border-top:2px solid #f59e0b;border-radius:8px;padding:12px;margin-top:8px"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:#f5f5f0;margin-bottom:4px">'+e(tripData.name||'')+'</div><div style="font-size:12px;color:#888">'+e(tripData.startDate||'')+' – '+e(tripData.endDate||'')+'  ·  '+e(tripData.totalMiles||'')+'</div></div>';}catch(err){AI_PENDING_TRIP=null;}
  }
  div.innerHTML=formatted;
  if(AI_PENDING_TRIP&&role==='assistant'&&tripMatch){var importBtn=document.createElement('button');importBtn.className='ai-import-btn';importBtn.textContent='🏍 Add This Trip to My Trips';tap(importBtn,function(){importAITrip();});div.appendChild(importBtn);}
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
  if(role==='user'){var st=document.getElementById('ai-starters');if(st)st.style.display='none';}

function addThinking(){
  var msgs=document.getElementById('ai-msgs');if(!msgs)return null;
  var div=document.createElement('div');div.className='ai-msg thinking';div.id='ai-thinking';div.textContent='Planning your ride...';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;

function sendAIMessage(){
  var input=document.getElementById('ai-input');if(!input)return;
  var text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';
  addAIMessage('user',text);AI_HISTORY.push({role:'user',content:text});
  var thinking=addThinking();var sendBtn=document.getElementById('ai-send');if(sendBtn)sendBtn.disabled=true;
  fetch('https://rumbling-nomad-ai.bpearltx.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,system:AI_SYSTEM,messages:AI_HISTORY})})
  .then(function(r){return r.json();})
  .then(function(data){
    if(thinking)thinking.remove();if(sendBtn)sendBtn.disabled=false;
    var reply='';if(data.content&&data.content.length){data.content.forEach(function(block){if(block.type==='text')reply+=block.text;});}

    if(reply){AI_HISTORY.push({role:'assistant',content:reply});addAIMessage('assistant',reply);}
  })
  .catch(function(){if(thinking)thinking.remove();if(sendBtn)sendBtn.disabled=false;addAIMessage('assistant','Having trouble connecting right now. Check your connection and try again.');});
}

var IMPORT={map:null,markers:[],geocoder:null,bounds:null,allReports:[],totalSeen:0};
var CLUSTER_METERS=1500;      // photos within this distance = same stop
var CLUSTER_TIME_GAP_MIN=45;  // OR a time gap bigger than this starts a new stop

function renderImport(data){
  var el=document.getElementById('panel-ride');if(!el)return;
  IMPORT.map=null;IMPORT.markers=[];IMPORT.bounds=null;
  // Reset the accumulator when the user re-enters the tab fresh
  IMPORT.allReports=[];IMPORT.totalSeen=0;
  el.innerHTML=''
    +'<div class="imp-wrap">'
    +'  <div class="imp-hero">'
    +'    <div class="imp-hero-title">Organize Today\u2019s Ride</div>'

    +'  </div>'
    +'  <div id="imp-results"></div>'

function handleImportFiles(files){
  if(!files||!files.length)return;
  var results=document.getElementById('imp-results');if(!results)return;
  var batchSize=files.length;
  var alreadyHave=IMPORT.allReports.length;
  // Show a status banner that doesn't blow away existing results
  var status=document.getElementById('imp-status');
  if(!status){
    var s=document.createElement('div');
    s.className='imp-status';s.id='imp-status';
    s.innerHTML='<div class="spinner"></div><div class="imp-status-text" id="imp-status-text">Reading '+batchSize+' photo'+(batchSize>1?'s':'')+'\u2026</div>';
    results.insertBefore(s,results.firstChild);
  }else{
    var st=document.getElementById('imp-status-text');
    if(st)st.textContent='Reading '+batchSize+' more photo'+(batchSize>1?'s':'')+'\u2026';
  }
  var read=0,newReports=new Array(batchSize);
  var arr=Array.from(files);
  var jobs=arr.map(function(file,idx){
    return Promise.all([readExifFull(file),fileToDataUrl(file)]).then(function(pair){
      read++;
      var st=document.getElementById('imp-status-text');
      if(st)st.textContent='Reading photos\u2026 '+read+' of '+batchSize+' in this batch';
      var info=pair[0]||{},dataUrl=pair[1];
      newReports[idx]={
        name:file.name||'(no name)',
        size:file.size||0,
        type:file.type||'(unknown)',
        hasGps:typeof info.lat==='number'&&typeof info.lng==='number',
        lat:info.lat,lng:info.lng,
        ts:info.ts||0,
        when:info.whenRaw||null,
        make:info.make||null,
        model:info.model||null,
        rawKeys:info.rawKeys||[],
        parseError:info.parseError||null,
        data:dataUrl
      };
    }).catch(function(err){
      read++;
      newReports[idx]={name:file.name||'(no name)',size:file.size||0,type:file.type||'(unknown)',hasGps:false,parseError:String(err&&err.message||err||'unknown error')};
    });
  });
  Promise.all(jobs).then(function(){
    // De-duplicate against existing reports by name+size (same photo picked twice)
    var existingKeys={};
    IMPORT.allReports.forEach(function(r){existingKeys[r.name+':'+r.size]=true;});
    var dedupAdded=0;
    newReports.forEach(function(r){
      if(!r)return;
      var k=r.name+':'+r.size;
      if(existingKeys[k])return; // skip duplicate
      existingKeys[k]=true;
      IMPORT.allReports.push(r);
      dedupAdded++;
    });
    IMPORT.totalSeen=IMPORT.allReports.length;
    var withGps=IMPORT.allReports.filter(function(r){return r.hasGps;});
    renderDiagnostic(results,IMPORT.allReports,withGps.length,IMPORT.totalSeen,{justAdded:dedupAdded,batchSize:batchSize});
    if(withGps.length){
      var photos=withGps.map(function(r){return{lat:r.lat,lng:r.lng,ts:r.ts||0,data:r.data,name:r.name};});
      photos.sort(function(a,b){return a.ts-b.ts;});
      // Reset map state so we rebuild from the full accumulated set
      IMPORT.map=null;IMPORT.markers=[];IMPORT.bounds=null;
      var clusters=clusterPhotos(photos);
      renderImportResults(document.getElementById('imp-map-section'),clusters,withGps.length,IMPORT.totalSeen);
      loadGmaps();onGmapsReady(function(){plotImportMap(clusters);reverseGeocodeClusters(clusters);});
    }
  });
}

function renderDiagnostic(container,reports,gpsCount,total,meta){
  meta=meta||{};
  var diagHidden=true; // diagnostic collapsed by default — magic moment leads
  var addedNote='';
  if(meta.justAdded!=null&&meta.batchSize!=null){
    if(meta.justAdded===0){
      addedNote='<div class="imp-added-note imp-added-skip">All '+meta.batchSize+' from that batch were already imported \u2014 nothing new added.</div>';
    }else if(meta.justAdded<meta.batchSize){
      addedNote='<div class="imp-added-note">Added '+meta.justAdded+' new \u00b7 skipped '+(meta.batchSize-meta.justAdded)+' duplicates.</div>';
    }else{
      addedNote='<div class="imp-added-note">Added '+meta.justAdded+' new photo'+(meta.justAdded>1?'s':'')+'.</div>';
    }
  }
  var html=''
    +'<div class="imp-running-bar">'
    +'  <div class="imp-running-stats">'
    +'    <div class="imp-running-num">'+gpsCount+'</div>'
    +'    <div class="imp-running-lbl">photo'+(gpsCount===1?'':'s')+' on map<br><span class="imp-running-sub">'+total+' imported total</span></div>'
    +'  </div>'
    +'  <div class="imp-running-actions">'
    +'    <button class="imp-add-btn" id="imp-add-more">+ Add More</button>'
    +'    <button class="imp-reset-btn" id="imp-reset">Start Over</button>'
    +'  </div>'
    +'</div>'
    +addedNote
    +'<div id="imp-map-section"></div>'
    +(gpsCount>0?'<button class="imp-save-btn" id="imp-save-journal">\uD83D\uDCBE Save These '+gpsCount+' Photo'+(gpsCount===1?'':'s')+' to a Trip</button>':'')
    +'<div class="imp-diag-toggle-row">'
    +'  <button class="imp-diag-toggle" id="imp-diag-toggle">\uD83D\uDD0D Show diagnostic ('+total+' photo'+(total===1?'':'s')+')</button>'
    +'</div>'
    +'<div id="imp-diag-body" class="imp-diag-body" style="display:none">'
    +'  <div class="imp-diag-help">For each photo iOS handed the app, this shows what the app received. If GPS says NO here but Photos shows a map on that same photo, iOS stripped it on the way over.</div>';
  reports.forEach(function(r,i){
    var fmt=r.type||'';
    var fmtShort=fmt.indexOf('heic')>=0||fmt.indexOf('heif')>=0?'HEIC':(fmt.indexOf('jpeg')>=0||fmt.indexOf('jpg')>=0?'JPEG':(fmt.indexOf('png')>=0?'PNG':(fmt||'?')));
    var sizeKb=Math.round((r.size||0)/1024);
    var gpsLine=r.hasGps
      ? '<span class="imp-yes">YES</span> &middot; '+r.lat.toFixed(5)+', '+r.lng.toFixed(5)
      : '<span class="imp-no">NO</span>';
    var tsLine=r.ts?new Date(r.ts).toLocaleString():(r.when||'<span class="imp-no">none</span>');
    var camLine=(r.make||r.model)?[r.make,r.model].filter(Boolean).join(' '):'<span class="imp-no">none</span>';
    var rawLine=r.rawKeys&&r.rawKeys.length?r.rawKeys.slice(0,12).join(', ')+(r.rawKeys.length>12?'\u2026':''):'<span class="imp-no">no exif keys returned</span>';
    html+=''
      +'<div class="imp-diag-row">'
      +'  <div class="imp-diag-head">#'+(i+1)+' &middot; '+escAttr(r.name)+'</div>'
      +'  <div class="imp-diag-line"><span class="imp-diag-lbl">Format:</span> '+escAttr(fmtShort)+' <span class="imp-diag-sub">('+escAttr(fmt||'no type')+')</span></div>'
      +'  <div class="imp-diag-line"><span class="imp-diag-lbl">Size:</span> '+sizeKb.toLocaleString()+' KB</div>'
      +'  <div class="imp-diag-line"><span class="imp-diag-lbl">GPS:</span> '+gpsLine+'</div>'
      +'  <div class="imp-diag-line"><span class="imp-diag-lbl">Taken:</span> '+escAttr(tsLine)+'</div>'
      +'  <div class="imp-diag-line"><span class="imp-diag-lbl">Camera:</span> '+escAttr(camLine)+'</div>'
      +'  <div class="imp-diag-line"><span class="imp-diag-lbl">EXIF keys:</span> <span class="imp-diag-sub">'+escAttr(rawLine)+'</span></div>'
      +(r.parseError?'<div class="imp-diag-line imp-diag-err">Parse error: '+escAttr(r.parseError)+'</div>':'')
      +'</div>';
  });
  html+='</div>'; // close imp-diag-body
  container.innerHTML=html;

  // Wire the new buttons
  tap(document.getElementById('imp-add-more'),function(){
    var inp=document.getElementById('imp-file-input');
    if(inp){inp.value='';inp.click();}
  });
  tap(document.getElementById('imp-reset'),function(){
    if(!confirm('Clear all imported photos and start over?'))return;
    IMPORT.allReports=[];IMPORT.totalSeen=0;
    IMPORT.map=null;IMPORT.markers=[];IMPORT.bounds=null;
    container.innerHTML='';
  });
  tap(document.getElementById('imp-diag-toggle'),function(){
    var body=document.getElementById('imp-diag-body');
    var btn=document.getElementById('imp-diag-toggle');
    if(!body||!btn)return;
    var hidden=body.style.display==='none';
    body.style.display=hidden?'block':'none';
    btn.innerHTML=(hidden?'\uD83D\uDD0D Hide diagnostic':'\uD83D\uDD0D Show diagnostic')+' ('+total+' photo'+(total===1?'':'s')+')';
  });
  tap(document.getElementById('imp-save-journal'),function(){openSaveToJournal();});
}

    +'<p style="font-size:13px;color:var(--smoke);line-height:1.6;margin-bottom:14px">These photos span '+importDaySpan(withGps)+'. Start a new documented trip from them, or add them to a trip you already have.</p>'
    +'<div class="imp-day-list">'
    +'  <button class="imp-day-choice" id="imp-newtrip"><span class="imp-day-choice-date">RECOMMENDED</span><span class="imp-day-choice-title">\uD83C\uDD95 Create a new trip from these photos</span></button>'
    +'  <button class="imp-day-choice" id="imp-existtrip"><span class="imp-day-choice-date">OR</span><span class="imp-day-choice-title">\uD83D\uDCC1 Add to an existing trip</span></button>'
    +'</div>'
    +'<div class="modal-actions"><button class="small-btn" id="imp-save-cancel">Cancel</button></div></div>';
  document.body.appendChild(ov);
  tap(document.getElementById('imp-save-cancel'),function(){ov.remove();});
  tap(ov,function(ev){if(ev.target===ov)ov.remove();});
  tap(document.getElementById('imp-newtrip'),function(){ov.remove();createTripFromImport(withGps);});
  tap(document.getElementById('imp-existtrip'),function(){ov.remove();chooseExistingTrip(withGps);});
}

function importDaySpan(withGps){
  var dates={};
  withGps.forEach(function(r){if(r.ts)dates[new Date(r.ts).toDateString()]=1;});
  var n=Object.keys(dates).length;
  return n<=1?'one day':(n+' days');
}

// Build a brand-new documented trip from the imported photo clusters
function createTripFromImport(withGps){
  var photos=withGps.slice().sort(function(a,b){return (a.ts||0)-(b.ts||0);});
  // group photos into day-buckets by calendar date
  var byDay={};
  photos.forEach(function(r){
    var key=r.ts?new Date(r.ts).toDateString():'Undated';
    (byDay[key]=byDay[key]||[]).push(r);
  });
  var dayKeys=Object.keys(byDay);
  // derive trip name/from/to from first & last place we can name via existing reports
  var firstTs=photos[0].ts?new Date(photos[0].ts):null;
  var lastTs=photos[photos.length-1].ts?new Date(photos[photos.length-1].ts):null;
  var fmt=function(d){return d?(d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2):'';};
  var defName='My Ride '+(firstTs?fmt(firstTs):'');
  var name=prompt('Name this trip:', defName);
  if(name===null)return; // cancelled
  if(!name.trim())name=defName;

  var id='trip_'+Date.now();
  var days=[];
  dayKeys.forEach(function(key,i){
    var dphotos=byDay[key];
    var d=new Date(dphotos[0].ts||Date.now());
    days.push({
      id:'day_'+id+'_'+i,
      date:d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}),
      title:'Day '+(i+1),
      stops:[], note:''
    });
  });
  var nd={id:id,name:name,from:(firstTs?fmt(firstTs):''),to:(lastTs?fmt(lastTs):''),
    startDate:(firstTs?firstTs.toLocaleDateString():''),endDate:(lastTs?lastTs.toLocaleDateString():''),
    tagline:'Documented from photos',totalMiles:'TBD',nights:Math.max(0,dayKeys.length-1),budget:'',
    sections:[{id:'ride',label:'The Ride',icon:'\u2192',days:days}],
    checklist:{bike:[{section:'Bike',items:[]}],gear:[{section:'Gear',items:[]}],pack:[{section:'Packing',items:[]}],admin:[{section:'Admin',items:[]}],daily:[{section:'Daily',items:[]}]}
  };
  var trips=getTrips();
  trips.unshift({id:id,name:name,from:nd.from,to:nd.to,startDate:nd.startDate,endDate:nd.endDate});
  saveTrips(trips); saveTD(id,nd);
  // attach photos to their day buckets
  var photoStore={};
  dayKeys.forEach(function(key,i){
    var dayId='day_'+id+'_'+i;
    photoStore[dayId]=byDay[key].map(function(r){
      return {data:r.data,name:r.name||'',ts:r.ts||Date.now(),lat:r.lat,lng:r.lng,caption:''};
    });
  });
  try{ savePhotos(id,photoStore); }
  catch(err){ alert('Storage is full — too many photos to save on this device. Try fewer photos.'); return; }
  // open the new trip
  var ov=document.createElement('div');ov.className='modal-overlay open';
  ov.innerHTML='<div class="modal"><div class="modal-title">Trip Created \u2713</div>'
    +'<p style="font-size:14px;color:var(--smoke-light);line-height:1.6;margin-bottom:8px"><b style="color:var(--white)">'+e(name)+'</b> created with '+photos.length+' photo'+(photos.length===1?'':'s')+' across '+dayKeys.length+' day'+(dayKeys.length===1?'':'s')+'.</p>'
    +'<div class="modal-actions"><button class="small-btn amber" id="imp-newtrip-go">Open Trip</button></div></div>';
  document.body.appendChild(ov);
  tap(document.getElementById('imp-newtrip-go'),function(){ov.remove();openTrip(id);});
  tap(ov,function(ev){if(ev.target===ov)ov.remove();});
}

// Choose among existing trips, then pick a day in that trip
function chooseExistingTrip(withGps){
  var trips=getTrips();
  if(!trips.length){alert('No existing trips yet — create one from these photos instead.');return;}
  var ov=document.createElement('div');ov.className='modal-overlay open';ov.id='imp-save-modal';
  var rows=trips.map(function(t){
    return '<button class="imp-day-choice" data-tripid="'+e(t.id)+'"><span class="imp-day-choice-date">'+e(t.from||'')+(t.to?' \u2192 '+e(t.to):'')+'</span><span class="imp-day-choice-title">'+e(t.name||'(untitled trip)')+'</span></button>';
  }).join('');
  ov.innerHTML='<div class="modal"><div class="modal-title">Add to which trip?</div>'
    +'<div class="imp-day-list">'+rows+'</div>'
    +'<div class="modal-actions"><button class="small-btn" id="imp-exist-cancel">Cancel</button></div></div>';
  document.body.appendChild(ov);
  tap(document.getElementById('imp-exist-cancel'),function(){ov.remove();});
  tap(ov,function(ev){if(ev.target===ov)ov.remove();});
  ov.querySelectorAll('.imp-day-choice').forEach(function(btn){
    tap(btn,function(){ov.remove();pickDayInTrip(btn.getAttribute('data-tripid'),withGps);});
  });
}

function pickDayInTrip(tripId,withGps){
  var data=getTD(tripId);if(!data){alert('Could not open that trip.');return;}
  var allDays=getAllDays(data);
  var ov=document.createElement('div');ov.className='modal-overlay open';ov.id='imp-save-modal';
  var daysHtml=allDays.map(function(d){
    return '<button class="imp-day-choice" data-dayid="'+e(d.id)+'"><span class="imp-day-choice-date">'+e(d.date||'')+'</span><span class="imp-day-choice-title">'+e(d.title||'(untitled day)')+'</span></button>';
  }).join('');
  ov.innerHTML='<div class="modal"><div class="modal-title">Which day?</div>'
    +'<div class="imp-day-list">'+(daysHtml||'<div style="color:var(--smoke);font-size:13px;padding:8px 0">This trip has no days yet.</div>')+'</div>'
    +'<div class="modal-actions"><button class="small-btn" id="imp-day-cancel">Cancel</button></div></div>';
  document.body.appendChild(ov);
  tap(document.getElementById('imp-day-cancel'),function(){ov.remove();});
  tap(ov,function(ev){if(ev.target===ov)ov.remove();});
  ov.querySelectorAll('.imp-day-choice').forEach(function(btn){
    tap(btn,function(){saveImportToDay(btn.getAttribute('data-dayid'),withGps,ov,tripId);});
  });
}

function saveImportToDay(dayId,withGps,modalEl,tripId){
  tripId=tripId||ST.tripId;
  var photos=getPhotos(tripId);
  if(!photos[dayId])photos[dayId]=[];
  // de-dup against what's already on that day by name+ts
  var have={};
  photos[dayId].forEach(function(p){have[(p.name||'')+':'+(p.ts||0)]=true;});
  var added=0;
  // sort by timestamp so they land in ride order
  withGps.slice().sort(function(a,b){return (a.ts||0)-(b.ts||0);}).forEach(function(r){
    var key=(r.name||'')+':'+(r.ts||0);
    if(have[key])return;
    have[key]=true;
    photos[dayId].push({data:r.data,name:r.name||'',ts:r.ts||Date.now(),lat:r.lat,lng:r.lng,caption:''});
    added++;
  });
  try{
    savePhotos(tripId,photos);
  }catch(err){
    alert('Storage is full — too many photos saved on this device. Try saving fewer at a time, or remove older photos.');
    return;
  }
  if(modalEl)modalEl.remove();
  // Confirm + offer to jump to the Journal
  var data=getTD(tripId),day=getDayById(data,dayId);
  var ov=document.createElement('div');ov.className='modal-overlay open';
  ov.innerHTML='<div class="modal"><div class="modal-title">Saved \u2713</div>'
    +'<p style="font-size:14px;color:var(--smoke-light);line-height:1.6;margin-bottom:6px">'+added+' photo'+(added===1?'':'s')+' saved to <b style="color:var(--white)">'+e(day.title||day.date||'that day')+'</b> in your Journal.</p>'
    +(added<withGps.length?'<p style="font-size:12px;color:var(--smoke);margin-bottom:10px">'+(withGps.length-added)+' were already on that day and were skipped.</p>':'')
    +'<div class="modal-actions"><button class="small-btn" id="imp-saved-stay">Keep Importing</button><button class="small-btn amber" id="imp-saved-go">Open Trip</button></div></div>';
  document.body.appendChild(ov);
  tap(document.getElementById('imp-saved-stay'),function(){ov.remove();});
  tap(document.getElementById('imp-saved-go'),function(){ov.remove();openTrip(tripId);});
  tap(ov,function(ev){if(ev.target===ov)ov.remove();});
}

// allow either escaped or raw HTML in diagnostic values; for plain text fields use escAttr
function escAttr(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function readExifFull(file){
  if(!window.exifr)return Promise.resolve({parseError:'exifr library not loaded'});
  return fileToArrayBuffer(file).then(function(buf){
    return window.exifr.parse(buf,{gps:true,tiff:true,ifd0:true,exif:true,xmp:true,iptc:true,translateKeys:true,translateValues:true,reviveValues:true})
      .then(function(d){
        if(!d)return{parseError:'exifr returned null (file may not contain readable metadata)',rawKeys:[]};
        var out={
          lat:typeof d.latitude==='number'?d.latitude:null,
          lng:typeof d.longitude==='number'?d.longitude:null,
          make:d.Make||null,
          model:d.Model||null,
          rawKeys:Object.keys(d).filter(function(k){return k!=='errors';})
        };
        var when=d.DateTimeOriginal||d.CreateDate||d.ModifyDate;
        if(when){
          var dt=when instanceof Date?when:new Date(when);
          if(!isNaN(dt.getTime())){out.ts=dt.getTime();out.whenRaw=dt.toLocaleString();}
        }
        if(d.errors&&d.errors.length){out.parseError='exifr errors: '+d.errors.length+' segment(s) failed';}
        return out;
      })
      .catch(function(err){return{parseError:'parse threw: '+(err&&err.message||err),rawKeys:[]};});
  }).catch(function(err){return{parseError:'read threw: '+(err&&err.message||err),rawKeys:[]};});
}

// Kept for the map render path — uses the full reader internally
function readExif(file){
  return readExifFull(file).then(function(r){
    if(!r||r.lat==null||r.lng==null)return null;
    return{lat:r.lat,lng:r.lng,ts:r.ts||0};
  });
}

function fileToArrayBuffer(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result);};
    r.onerror=function(){rej();};
    r.readAsArrayBuffer(file);
  });
}

function fileToDataUrl(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result);};
    r.onerror=function(){rej();};
    r.readAsDataURL(file);
  });
}

function haversine(aLat,aLng,bLat,bLng){
  var R=6371000,toRad=function(d){return d*Math.PI/180;};
  var dLat=toRad(bLat-aLat),dLng=toRad(bLng-aLng);
  var s=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(toRad(aLat))*Math.cos(toRad(bLat))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(s));
}
function clusterPhotos(photos){
  var clusters=[],cur=null;
  photos.forEach(function(p){
    if(!cur){cur=newCluster(p);clusters.push(cur);return;}
    var dist=haversine(cur.lat,cur.lng,p.lat,p.lng);
    var gapMin=(cur.lastTs&&p.ts)?Math.abs(p.ts-cur.lastTs)/60000:0;
    if(dist<=CLUSTER_METERS&&(!gapMin||gapMin<=CLUSTER_TIME_GAP_MIN)){
      cur.photos.push(p);
      var n=cur.photos.length;
      cur.lat=(cur.lat*(n-1)+p.lat)/n;
      cur.lng=(cur.lng*(n-1)+p.lng)/n;
      if(p.ts)cur.lastTs=p.ts;
      if(p.ts&&(!cur.firstTs||p.ts<cur.firstTs))cur.firstTs=p.ts;
    }else{
      cur=newCluster(p);clusters.push(cur);
    }
  });
  return clusters;
}
function newCluster(p){return{lat:p.lat,lng:p.lng,firstTs:p.ts||0,lastTs:p.ts||0,photos:[p],place:null};}

function renderImportResults(container,clusters,gpsCount,total){
  if(!container)return;
  var html=''
    +'<div class="imp-diag-title" style="margin-top:14px">\uD83D\uDDFA Organized Map</div>'
    +'<div class="imp-map-wrap"><div id="imp-map"></div></div>';
  clusters.forEach(function(c,i){
    html+='<div class="imp-stop"><div class="imp-stop-head"><div class="imp-stop-dot"></div><div class="imp-stop-name" id="imp-place-'+i+'">Locating\u2026</div><div class="imp-stop-time">'+fmtClusterTime(c)+'</div></div><div class="imp-stop-grid">';
    c.photos.forEach(function(p){html+='<img class="imp-stop-thumb" src="'+p.data+'" alt="">';});
    html+='</div></div>';
  });
  container.innerHTML=html;
}
function fmtClusterTime(c){
  if(!c.firstTs)return c.photos.length+' photo'+(c.photos.length>1?'s':'');
  var d=new Date(c.firstTs);
  var h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';
  h=h%12;if(h===0)h=12;
  return (h)+':'+(m<10?'0':'')+m+' '+ap;
}

function plotImportMap(clusters){
  var mapEl=document.getElementById('imp-map');if(!mapEl||!window.google)return;
  IMPORT.map=new google.maps.Map(mapEl,{zoom:9,center:{lat:clusters[0].lat,lng:clusters[0].lng},mapTypeId:google.maps.MapTypeId.TERRAIN,disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy'});
  IMPORT.bounds=new google.maps.LatLngBounds();
  clusters.forEach(function(c,i){
    var ll={lat:c.lat,lng:c.lng};
    var marker=new google.maps.Marker({position:ll,map:IMPORT.map,label:{text:String(i+1),color:'#0f0f0f',fontSize:'12px',fontWeight:'700'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:13,fillColor:'#f59e0b',fillOpacity:1,strokeColor:'#0f0f0f',strokeWeight:2}});
    IMPORT.markers.push(marker);
    IMPORT.bounds.extend(ll);
  });
  if(clusters.length>1){
    new google.maps.Polyline({path:clusters.map(function(c){return{lat:c.lat,lng:c.lng};}),map:IMPORT.map,strokeColor:'#f59e0b',strokeOpacity:.6,strokeWeight:3});
    IMPORT.map.fitBounds(IMPORT.bounds,40);
  }else{
    IMPORT.map.setZoom(13);
  }
}

function reverseGeocodeClusters(clusters){
  if(!window.google)return;
  if(!IMPORT.geocoder)IMPORT.geocoder=new google.maps.Geocoder();
  clusters.forEach(function(c,i){
    setTimeout(function(){
      IMPORT.geocoder.geocode({location:{lat:c.lat,lng:c.lng}},function(res,status){
        var label='Unknown location';
        if(status==='OK'&&res&&res.length){label=shortPlace(res);}
        c.place=label;
        var el=document.getElementById('imp-place-'+i);if(el)el.textContent=label;
      });
    },i*250);
  });
}
function shortPlace(results){
  var locality=null,admin=null,fallback=results[0].formatted_address;
  results.forEach(function(r){
    r.address_components.forEach(function(comp){
      if(!locality&&comp.types.indexOf('locality')!==-1)locality=comp.long_name;
      if(!admin&&comp.types.indexOf('administrative_area_level_1')!==-1)admin=comp.short_name;
    });
  });
  if(locality&&admin)return locality+', '+admin;
  if(locality)return locality;
  if(admin)return admin;
  return fallback;
}
