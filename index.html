<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rumbling Nomad">
<meta name="theme-color" content="#0f0f0f">
<title>Rumbling Nomad</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --asphalt:#0f0f0f;--asphalt-2:#1a1a1a;--asphalt-3:#242424;--asphalt-4:#2e2e2e;
  --amber:#f59e0b;--amber-dim:#92600a;--ember:#ef4444;
  --smoke:#888;--smoke-light:#bbb;--white:#f5f5f0;
  --green:#22c55e;--purple:#a78bfa;--blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;background:var(--asphalt);color:var(--white);font-family:'Barlow',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto}
.app-header{padding:10px 14px 6px;background:var(--asphalt);border-bottom:1px solid var(--asphalt-3);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.08em;color:var(--amber);line-height:1}
.header-left p{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--smoke);letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
.header-actions{display:flex;gap:6px}
.hbtn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:5px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--asphalt-4);background:transparent;color:var(--smoke)}
.hbtn.primary{background:var(--amber);color:var(--asphalt);border-color:var(--amber)}
.nav-tabs{display:flex;background:var(--asphalt-2);border-bottom:1px solid var(--asphalt-3);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:9px 13px;white-space:nowrap;cursor:pointer;color:var(--smoke);border-bottom:2px solid transparent;flex-shrink:0}
.nav-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.panel{display:none;padding:12px 12px 90px}
.panel.active{display:block}
.bottom-nav{display:flex;background:var(--asphalt-2);border-top:1px solid var(--asphalt-3);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 4px;cursor:pointer;color:var(--smoke)}
.bnav-item.active{color:var(--amber)}
.bnav-icon{font-size:18px;line-height:1;margin-bottom:1px}
.bnav-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
/* CARDS */
.day-card{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:10px;margin-bottom:10px;overflow:hidden}
.day-card.hl{border-left:3px solid var(--amber)}
.day-card.devil{border-left:3px solid var(--ember)}
.card-header{padding:10px 12px 8px;display:flex;align-items:center;gap:8px;cursor:pointer}
.card-header:active{background:var(--asphalt-3)}
.card-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke);min-width:50px;flex-shrink:0}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--white);flex:1;line-height:1.2}
.card-miles{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--smoke);white-space:nowrap}
.card-chev{color:var(--smoke);font-size:11px;transition:transform .2s;flex-shrink:0}
.card-body{display:none;padding:0 12px 12px;border-top:1px solid var(--asphalt-3)}
.card-body.open{display:block}
/* STOPS */
.stops-list{padding-top:8px}
.stop-item{display:flex;gap:8px;padding-bottom:8px}
.stop-left{display:flex;flex-direction:column;align-items:center;width:12px;flex-shrink:0}
.stop-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.stop-line{width:1px;background:var(--asphalt-4);flex:1;margin-top:3px;min-height:10px}
.stop-item:last-child .stop-line{display:none}
.stop-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;color:var(--white);line-height:1.3}
.stop-note{font-size:12px;color:var(--smoke);line-height:1.4;margin-top:1px;font-weight:300}
.hotel-row{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--asphalt-3);font-size:12px;color:var(--smoke);line-height:1.5;margin-top:4px}
/* MILEAGE */
.mileage-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--asphalt-3);margin-top:6px}
.mileage-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--smoke);flex-shrink:0}
.mileage-input{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:5px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;padding:5px 8px;width:90px;outline:none;text-align:center}
.mileage-input:focus{border-color:var(--amber-dim)}
.mileage-unit{font-size:12px;color:var(--smoke)}
.mileage-total{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--amber);margin-left:auto}
/* WEATHER */
.weather-card{background:var(--asphalt-3);border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.weather-icon{font-size:28px;flex-shrink:0}
.weather-info{flex:1}
.weather-loc{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--white)}
.weather-desc{font-size:12px;color:var(--smoke);margin-top:1px}
.weather-temps{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber);letter-spacing:.02em;flex-shrink:0}
.weather-loading{font-size:12px;color:var(--smoke);padding:8px 0}
.weather-section{margin-bottom:12px}
.weather-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--smoke);margin-bottom:6px}
/* PHOTOS */
.photo-section{margin-top:10px;border-top:1px solid var(--asphalt-3);padding-top:10px}
.photo-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;cursor:pointer;background:var(--asphalt-3)}
.photo-thumb:active{opacity:.7}
.photo-add-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;background:transparent;border:1px dashed var(--asphalt-4);border-radius:6px;color:var(--smoke);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}
.photo-add-btn:active{border-color:var(--amber);color:var(--amber)}
.photo-input{display:none}
.photo-count{font-size:11px;color:var(--smoke)}
/* PHOTO VIEWER */
.photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
.photo-viewer.open{display:flex}
.photo-viewer-img{max-width:100%;max-height:75vh;object-fit:contain;border-radius:4px}
.photo-viewer-actions{display:flex;gap:10px;margin-top:16px;padding:0 16px}
.photo-viewer-caption{font-size:13px;color:var(--smoke-light);margin-top:8px;text-align:center;padding:0 20px;line-height:1.5}
.pv-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:4px}
/* SHARE */
.share-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border:none}
.share-btn.fb{background:#1877f2;color:#fff}
.share-btn.native{background:var(--asphalt-3);border:1px solid var(--asphalt-4);color:var(--white)}
.share-btn.copy{background:var(--asphalt-3);border:1px solid var(--asphalt-4);color:var(--white)}
/* EDIT */
.edit-field{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:6px;color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 10px;width:100%;outline:none;margin-bottom:6px}
.edit-field:focus{border-color:var(--amber-dim)}
textarea.edit-field{resize:none;min-height:58px;line-height:1.5}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke);margin-bottom:3px;margin-top:8px}
.field-label:first-child{margin-top:10px}
.field-row{display:flex;gap:6px}
.field-row .edit-field{margin-bottom:0}
.small-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:7px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--asphalt-4);background:transparent;color:var(--smoke);white-space:nowrap;flex-shrink:0}
.small-btn.amber{background:var(--amber);color:var(--asphalt);border-color:var(--amber)}
.small-btn.red{border-color:#450a0a;color:var(--ember)}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;background:transparent;border:1px dashed var(--asphalt-4);border-radius:6px;color:var(--smoke);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;width:100%;margin-top:4px}
.add-row-btn:active{border-color:var(--amber);color:var(--amber)}
.edit-day-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;background:transparent;border:1px solid var(--asphalt-4);border-radius:6px;color:var(--smoke);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;margin-top:10px}
/* OVERVIEW */
.intro-card{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-top:3px solid var(--amber);border-radius:10px;padding:12px;margin-bottom:12px}
.intro-route{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.03em;color:var(--white);line-height:1}
.intro-route span{color:var(--amber)}
.intro-dates{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--smoke);margin-top:3px}
.intro-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.intro-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;padding:2px 7px;border:1px solid var(--asphalt-4);border-radius:3px;color:var(--smoke-light);text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.stat{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:8px;padding:8px 10px}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--smoke);margin-bottom:2px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber);line-height:1}
.tip{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:8px;padding:9px 11px;margin-bottom:7px;font-size:13px;color:var(--smoke-light);line-height:1.6;font-weight:300}
.tip b{font-weight:500;color:var(--white)}
.tip.critical{border-left:3px solid var(--ember)}
.tip.good{border-left:3px solid var(--green)}
.tip.info{border-left:3px solid var(--blue)}
.timeline{display:flex;border-radius:4px;overflow:hidden;margin-bottom:12px;height:22px}
.tseg{display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:0 4px}
.sec-header{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.05em;color:var(--white);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
/* CHECKLIST */
.check-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.check-tab{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--asphalt-4);border-radius:20px;cursor:pointer;color:var(--smoke);background:transparent}
.check-tab.active{background:var(--amber);color:var(--asphalt);border-color:var(--amber)}
.check-panel{display:none}.check-panel.active{display:block}
.check-section{margin-bottom:14px}
.check-sec-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--asphalt-3)}
.check-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--asphalt-3);cursor:pointer;-webkit-user-select:none;user-select:none}
.check-item:last-child{border-bottom:none}
.check-box{width:19px;height:19px;border:1.5px solid var(--asphalt-4);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check-box.done{background:var(--amber);border-color:var(--amber)}
.check-box.done::after{content:'✓';font-size:11px;color:var(--asphalt);font-weight:700}
.check-label{flex:1;font-size:13px;color:var(--white);line-height:1.4}
.check-label.done{color:var(--smoke);text-decoration:line-through}
.check-note{font-size:11px;color:var(--smoke);margin-top:2px;line-height:1.4;font-weight:300;display:block}
.check-del{background:transparent;border:none;color:var(--asphalt-4);font-size:15px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;margin-top:1px}
.check-del:active{color:var(--ember)}
.progress-wrap{background:var(--asphalt-2);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--smoke-light)}
.progress-track{height:3px;background:var(--asphalt-4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .3s;width:0%}
.reset-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--asphalt-4);border-radius:20px;background:transparent;color:var(--smoke);cursor:pointer}
.add-check-row{display:flex;gap:6px;margin-top:8px}
.add-check-row .edit-field{margin-bottom:0;flex:1}
.stop-edit-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px;background:var(--asphalt-3);border-radius:6px;padding:8px}
.stop-edit-inputs{flex:1;display:flex;flex-direction:column;gap:4px}
.stop-edit-inputs .edit-field{margin-bottom:0;background:var(--asphalt-4)}
.stop-del-btn{background:transparent;border:none;color:var(--smoke);font-size:18px;cursor:pointer;padding:2px 0;line-height:1;flex-shrink:0;margin-top:2px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--asphalt-2);border-top:1px solid var(--asphalt-3);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:16px 16px calc(16px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;color:var(--amber);margin-bottom:12px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions .small-btn{flex:1;text-align:center}
.share-url{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:6px;padding:10px;font-size:12px;color:var(--smoke-light);word-break:break-all;line-height:1.5;margin:10px 0;font-family:monospace}
.trip-item{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px}
.trip-item:active{border-color:var(--amber)}
.trip-info{flex:1}
.trip-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--white)}
.trip-meta{font-size:12px;color:var(--smoke);margin-top:2px}
.trip-arrow{color:var(--smoke);font-size:18px}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.04em;padding:2px 5px;border-radius:3px;text-transform:uppercase;display:inline-block;margin-left:4px;vertical-align:middle}
.b-critical{background:#450a0a;color:#ef4444}
/* JOURNAL TAB */
.journal-day{background:var(--asphalt-2);border:1px solid var(--asphalt-3);border-radius:10px;margin-bottom:10px;overflow:hidden}
.journal-day-header{padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--asphalt-3)}
.journal-day-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke)}
.journal-day-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--white);flex:1}
.journal-day-body{padding:10px 12px 12px}
.journal-odometer{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--asphalt-3)}
.odo-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--smoke)}
.odo-input{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:5px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:18px;padding:4px 8px;width:100px;outline:none;text-align:center;letter-spacing:.04em}
.odo-input:focus{border-color:var(--amber-dim)}
.odo-unit{font-size:12px;color:var(--smoke)}
.odo-diff{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--amber);margin-left:auto}
.journal-note-input{background:var(--asphalt-3);border:1px solid var(--asphalt-4);border-radius:6px;color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 10px;width:100%;outline:none;resize:none;min-height:64px;line-height:1.5;margin-bottom:10px}
.journal-note-input:focus{border-color:var(--amber-dim)}
.journal-note-input::placeholder{color:var(--smoke)}
/* PHOTO GRID in journal */
.j-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.j-photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;cursor:pointer;display:block}
.j-photo-add{width:100%;aspect-ratio:1;background:var(--asphalt-3);border:1px dashed var(--asphalt-4);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--smoke);font-size:22px}
.j-photo-add:active{border-color:var(--amber);color:var(--amber)}
.j-share-row{display:flex;gap:8px;flex-wrap:wrap}
/* WEATHER in journal */
.j-weather{display:flex;align-items:center;gap:10px;background:var(--asphalt-3);border-radius:8px;padding:8px 10px;margin-bottom:10px}
.j-weather-icon{font-size:24px}
.j-weather-info{flex:1}
.j-weather-loc{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--white)}
.j-weather-desc{font-size:11px;color:var(--smoke);margin-top:1px}
.j-weather-temp{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber)}
.j-weather-btn{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border:1px solid var(--asphalt-4);border-radius:4px;background:transparent;color:var(--smoke);cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="header-left">
      <h1>RUMBLING NOMAD</h1>
      <p id="hdr-sub">Your Trips</p>
    </div>
    <div class="header-actions" id="hdr-actions"></div>
  </div>
  <div class="nav-tabs" id="main-nav" style="display:none"></div>
  <div class="scroll-area">
    <div id="view-home" class="panel active" style="padding-top:14px">
      <div id="trip-list"></div>

function getTrips(){return S.get('rn_trips')||[];}
function saveTrips(t){S.set('rn_trips',t);}
function getTD(id){return S.get('rn_td_'+id);}
function saveTD(id,d){S.set('rn_td_'+id,d);}
function getChecks(id){return S.get('rn_ch_'+id)||{};}
function saveChecks(id,d){S.set('rn_ch_'+id,d);}

function getOdo(id){return S.get('rn_odo_'+id)||{};}
function saveOdo(id,d){S.set('rn_odo_'+id,d);}

function initDefault(){
  var trips=getTrips();
  if(!trips.find(function(t){return t.id===DT.id;})){
    trips.unshift({id:DT.id,name:DT.name,from:DT.from,to:DT.to,startDate:DT.startDate,endDate:DT.endDate});
    saveTrips(trips);
    saveTD(DT.id,JSON.parse(JSON.stringify(DT)));
  }
}

function shareUrl(id){return window.location.href.split('?')[0].split('#')[0]+'?trip='+encodeURIComponent(id);}
function checkUrl(){var p=new URLSearchParams(window.location.search);var tid=p.get('trip');if(tid&&getTD(tid))openTrip(tid);}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function tap(el,fn){
  if(!el)return;
  var t=false;
  el.addEventListener('touchend',function(ev){t=true;ev.preventDefault();fn(ev);setTimeout(function(){t=false;},300);},{passive:false});
  el.addEventListener('click',function(ev){if(!t)fn(ev);});
}

function showPanel(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  var el=document.getElementById(id);if(el)el.classList.add('active');
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ── Home ──────────────────────────────────────────────────
function renderHome(){
  ST.view='home';ST.tripId=null;
  document.getElementById('hdr-sub').textContent='Your Trips';
  document.getElementById('hdr-actions').innerHTML='';
  document.getElementById('main-nav').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  showPanel('view-home');
  var trips=getTrips();
  var list=document.getElementById('trip-list');
  if(!trips.length){
    list.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--smoke)"><div style="font-size:40px;margin-bottom:12px">🏍</div><p style="font-size:14px;line-height:1.6">No trips yet.<br>Tap below to plan your first ride.</p></div>';
  } else {
    list.innerHTML=trips.map(function(t){
      return '<div class="trip-item" data-id="'+e(t.id)+'">'
        +'<div class="trip-info"><div class="trip-name">'+e(t.name)+'</div>'
        +'<div class="trip-meta">'+e(t.startDate)+' – '+e(t.endDate)+'</div></div>'
        +'<div class="trip-arrow">›</div></div>';
    }).join('');
    list.querySelectorAll('.trip-item').forEach(function(item){
      tap(item,function(){openTrip(item.getAttribute('data-id'));});
    });
  }
}

// ── Open trip ─────────────────────────────────────────────
function openTrip(id){
  var data=getTD(id);if(!data)return;
  ST.view='trip';ST.tripId=id;
  document.getElementById('hdr-sub').textContent=data.from+' → '+data.to;
  var ha=document.getElementById('hdr-actions');
  ha.innerHTML='<button class="hbtn" id="hb-back">← Trips</button><button class="hbtn primary" id="hb-share">Share</button>';
  tap(document.getElementById('hb-back'),function(){renderHome();});
  tap(document.getElementById('hb-share'),function(){document.getElementById('share-url').textContent=shareUrl(id);openModal('modal-share');});

  var nav=document.getElementById('main-nav');
  nav.style.display='flex';
  nav.innerHTML='<div class="nav-tab" data-main="overview">Overview</div>'
    +data.sections.map(function(s){return '<div class="nav-tab" data-main="'+s.id+'">'+e(s.label)+'</div>';}).join('')
    +'<div class="nav-tab" data-main="journal">Journal</div>'
    +'<div class="nav-tab" data-main="weather">Weather</div>'
    +'<div class="nav-tab" data-main="checklist">Checklist</div>';
  nav.querySelectorAll('.nav-tab').forEach(function(tab){
    tap(tab,function(){showTab(tab.getAttribute('data-main'),data);});
  });

  var bn=document.getElementById('bottom-nav');
  bn.style.display='flex';
  bn.innerHTML='<div class="bnav-item" data-main="overview"><div class="bnav-icon">◎</div><div class="bnav-label">Trip</div></div>'
    +'<div class="bnav-item" data-main="journal"><div class="bnav-icon">📷</div><div class="bnav-label">Journal</div></div>'
    +'<div class="bnav-item" data-main="weather"><div class="bnav-icon">☀</div><div class="bnav-label">Weather</div></div>'
    +'<div class="bnav-item" data-main="checklist"><div class="bnav-icon">✓</div><div class="bnav-label">Checklist</div></div>';
  bn.querySelectorAll('.bnav-item').forEach(function(item){
    tap(item,function(){showTab(item.getAttribute('data-main'),data);});
  });

  showTab('overview',data);
}

function showTab(tid,data){
  if(!data)data=getTD(ST.tripId);
  ST.tab=tid;
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-main')===tid);});
  document.querySelectorAll('.bnav-item').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-main')===tid);});
  if(tid==='overview'){renderOverview(data);showPanel('panel-overview');}
  else if(tid==='checklist'){renderChecklist(data);showPanel('panel-checklist');}
  else if(tid==='journal'){renderJournal(data);showPanel('panel-journal');}
  else if(tid==='weather'){renderWeather(data);showPanel('panel-weather');}
  else {
    var sec=data.sections.find(function(s){return s.id===tid;});
    if(sec){renderSection(sec,data);showPanel('panel-'+tid);}
  }
}

function renderJournal(data){

    var prevDayOdo=0;

    var idx=allDayIds.indexOf(day.id);
    if(idx>0){var prevDay=allDays[idx-1].day;var prevOdo=odo[prevDay.id]||{};prevDayOdo=prevOdo.end||0;}

      +'<div class="odo-label" style="margin-left:6px">End</div>'
      +'<input class="odo-input" data-odo="'+e(day.id)+'" data-odofield="end" placeholder="00000" value="'+e(dayOdo.end||'')+'" type="number" inputmode="numeric">'

      // Journal note
      +'<textarea class="journal-note-input" data-note="'+e(day.id)+'" placeholder="Notes from today\'s ride...">'+e(dayJrn.note||'')+'</textarea>'

      // Weather for this day
      +'<div class="j-weather" id="jw-'+e(day.id)+'">'
      +'<div class="j-weather-icon">☁</div>'
      +'<div class="j-weather-info"><div class="j-weather-loc">Tap to load weather</div><div class="j-weather-desc">for '+e(day.title)+'</div></div>'
      +'<button class="j-weather-btn" data-loadweather="'+e(day.id)+'" data-city="'+e(day.title)+'">Load</button>'
      +'</div>'

      // Photos
      +'<div style="margin-bottom:6px;font-family:\'Barlow Condensed\',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--smoke)">Photos ('+dayPhotos.length+')</div>'
      +'<div class="j-photo-grid" id="pg-'+e(day.id)+'">';

    dayPhotos.forEach(function(ph,pi){
      html+='<img class="j-photo-thumb" src="'+ph.data+'" data-viewphoto="'+e(day.id)+'" data-photoidx="'+pi+'" alt="">';
    });
    html+='<div class="j-photo-add" data-addphoto="'+e(day.id)+'"><span>+</span></div>'
      +'</div>'

      // Share row — single button, native share sheet on iPhone
      +'<div class="j-share-row">'
      +'<button class="share-btn fb" data-sharefb="'+e(day.id)+'" style="width:100%;justify-content:center">📤 Share This Day</button>'
      +'</div>'

      +'</div></div>';
  });

  el.innerHTML=html;

  // Odometer inputs
  el.querySelectorAll('[data-odo]').forEach(function(input){
    input.addEventListener('change',function(){
      var dayId=input.getAttribute('data-odo');
      var field=input.getAttribute('data-odofield');
      var val=parseInt(input.value)||0;
      var odoData=getOdo(ST.tripId);
      if(!odoData[dayId])odoData[dayId]={};
      odoData[dayId][field]=val;
      saveOdo(ST.tripId,odoData);
      // Update diff display
      var start=odoData[dayId].start||0;
      var end=odoData[dayId].end||0;
      var diff=end&&start?end-start:0;
      var row=input.closest('.journal-odometer');
      var diffEl=row.querySelector('.odo-diff');
      if(diff>0){
        if(!diffEl){diffEl=document.createElement('div');diffEl.className='odo-diff';row.appendChild(diffEl);}

      var dayId=btn.getAttribute('data-sharefb');
      shareToFacebook(dayId);
    });
  });

// ── Photo handling ────────────────────────────────────────
document.getElementById('photo-file-input').addEventListener('change',function(ev){
  var files=ev.target.files;
  if(!files||!files.length||!ST.photoCallback) return;
  var dayId=ST.photoCallback;
  Array.from(files).forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e2){
      var photos=getPhotos(ST.tripId);
      if(!photos[dayId])photos[dayId]=[];
      photos[dayId].push({data:e2.target.result,name:file.name,ts:Date.now()});
      try{savePhotos(ST.tripId,photos);}catch(err){alert('Storage full — try removing some photos first.');}
      // Update grid
      var grid=document.getElementById('pg-'+dayId);
      if(grid){
        var idx=photos[dayId].length-1;
        var img=document.createElement('img');
        img.className='j-photo-thumb';
        img.src=e2.target.result;
        img.setAttribute('data-viewphoto',dayId);
        img.setAttribute('data-photoidx',String(idx));
        tap(img,function(){openPhotoViewer(dayId,idx);});
        grid.insertBefore(img,grid.querySelector('.j-photo-add'));
        // Update count label
        var countEl=grid.previousElementSibling;
        if(countEl)countEl.textContent='Photos ('+photos[dayId].length+')';
      }
    };
    reader.readAsDataURL(file);
  });
  ev.target.value='';
  ST.photoCallback=null;
});

// ── Photo viewer ──────────────────────────────────────────
function openPhotoViewer(dayId,idx){
  var photos=getPhotos(ST.tripId);
  var dayPhotos=photos[dayId]||[];
  if(!dayPhotos[idx])return;
  ST.pvDayId=dayId; ST.pvPhotoIdx=idx;

// ── Share functions ───────────────────────────────────────
function shareToFacebook(dayId){
  var data=getTD(ST.tripId);
  var allDays=[];
  data.sections.forEach(function(s){s.days.forEach(function(d){allDays.push(d);});});
  var day=allDays.find(function(d){return d.id===dayId;});
  var jrn=getJournal(ST.tripId);
  var note=(jrn[dayId]&&jrn[dayId].note)||'';

  // Extract destination city for location tag
  var title=(day&&day.title)||'';
  var dest=title.split('→');
  var location=dest[dest.length-1].trim().replace(/overnight|arrive|🏠/gi,'').trim().split(',')[0].trim();
  var dateStr=(day&&day.date)||'';

  var text=dateStr+' · '+title
    +(location?'\n📍 '+location:'')
    +(note?'\n\n'+note:'')
    +'\n\n#RumblingNomad #motorcycle #HOG #motolife';

  if(navigator.share){
    var photos=getPhotos(ST.tripId);
    var dayPhotos=photos[dayId]||[];
    if(dayPhotos.length>0){
      fetch(dayPhotos[dayPhotos.length-1].data)
        .then(function(r){return r.blob();})
        .then(function(blob){
          var file=new File([blob],'ride-photo.jpg',{type:'image/jpeg'});
          var sd={title:'Rumbling Nomad',text:text};
          if(navigator.canShare&&navigator.canShare({files:[file]})){sd.files=[file];}
          else{sd.url=shareUrl(ST.tripId);}
          return navigator.share(sd);
        })
        .catch(function(){
          navigator.share({title:'Rumbling Nomad',text:text,url:shareUrl(ST.tripId)}).catch(function(){});
        });
    } else {
      navigator.share({title:'Rumbling Nomad',text:text,url:shareUrl(ST.tripId)}).catch(function(){});
    }
  } else {
    var caption=encodeURIComponent(text);
    var url=encodeURIComponent(shareUrl(ST.tripId));
    window.open('https://www.facebook.com/sharer/sharer.php?u='+url+'&quote='+caption,'_blank');
  }
}

// ── Weather ───────────────────────────────────────────────
var WEATHER_ICONS={'Clear':'☀️','Clouds':'☁️','Rain':'🌧️','Drizzle':'🌦️','Thunderstorm':'⛈️','Snow':'❄️','Mist':'🌫️','Fog':'🌫️','Haze':'🌫️'};

function extractCity(title){
  var parts=title.split('→');
  var dest=parts[parts.length-1].trim();
  dest=dest.replace(/overnight|arrive|🏠/gi,'').trim();
  dest=dest.split(',')[0].trim();
  dest=dest.split('–')[0].trim();
  return dest;
}

function loadWeatherForDay(dayId,title){
  var city=extractCity(title);
  var wcard=document.getElementById('jw-'+dayId);
  if(!wcard)return;
  wcard.innerHTML='<div class="j-weather-icon">⏳</div><div class="j-weather-info"><div class="j-weather-loc">Loading weather for '+e(city)+'...</div></div>';
  fetch('https://wttr.in/'+encodeURIComponent(city)+'?format=j1')
    .then(function(r){return r.json();})
    .then(function(data){
      var cur=data.current_condition[0];
      var desc=cur.weatherDesc[0].value;
      var tempF=cur.temp_F;
      var tempC=cur.temp_C;
      var icon=WEATHER_ICONS[desc]||'🌡️';
      wcard.innerHTML='<div class="j-weather-icon">'+icon+'</div>'
        +'<div class="j-weather-info"><div class="j-weather-loc">'+e(city)+'</div>'
        +'<div class="j-weather-desc">'+e(desc)+'</div></div>'
        +'<div class="j-weather-temp">'+e(tempF)+'°F</div>';
    })
    .catch(function(){
      wcard.innerHTML='<div class="j-weather-icon">❓</div>'
        +'<div class="j-weather-info"><div class="j-weather-loc">Weather unavailable</div>'
        +'<div class="j-weather-desc">Check weather.gov for '+e(city)+'</div></div>';
    });
}

function loadWeatherCard(city,label){
  var id='wc-'+encodeURIComponent(city);
  var card=document.getElementById(id);
  if(!card)return;
  fetch('https://wttr.in/'+encodeURIComponent(city)+'?format=j1')
    .then(function(r){return r.json();})
    .then(function(data){
      var cur=data.current_condition[0];
      var desc=cur.weatherDesc[0].value;
      var tempF=cur.temp_F;
      var hi=data.weather[0].maxtempF;
      var lo=data.weather[0].mintempF;
      var icon=WEATHER_ICONS[desc.split(' ')[0]]||'🌡️';
      card.querySelector('.weather-icon').textContent=icon;
      card.querySelector('.weather-loc').textContent=city;
      card.querySelector('.weather-desc').textContent=label+' · '+desc+' · Hi '+hi+'° Lo '+lo+'°';
      card.querySelector('.weather-temps').textContent=tempF+'°F';
    })
    .catch(function(){
      card.querySelector('.weather-icon').textContent='❓';
      card.querySelector('.weather-desc').textContent=label+' · Tap to retry';
      card.querySelector('.weather-temps').textContent='--°';
    });
}

// ── Checklist ─────────────────────────────────────────────
function renderChecklist(data){
  var el=document.getElementById('panel-checklist');
  var checks=getChecks(ST.tripId);
  var cl=data.checklist;
  var tabs=Object.keys(cl);

  var html='<div class="progress-wrap">'
    +'<div class="progress-row"><div class="progress-label" id="prog-lbl">0 of 0</div>'
    +'<button class="reset-btn" id="cl-reset">Reset All</button></div>'
    +'<div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>'
    +'</div>'
    +'<div class="check-tabs">'
    +tabs.map(function(t){return '<div class="check-tab'+(t===ST.checkTab?' active':'')+'" data-ck="'+t+'">'+cap(t)+'</div>';}).join('')
    +'</div>';

  tabs.forEach(function(tk){
    html+='<div class="check-panel'+(tk===ST.checkTab?' active':'')+'" id="ckp-'+tk+'">';
    cl[tk].forEach(function(sec){
      html+='<div class="check-section"><div class="check-sec-label">'+e(sec.section)+'</div>';
      sec.items.forEach(function(item,ii){
        var key=tk+'||'+sec.section+'||'+ii;
        var done=checks[key];
        html+='<div class="check-item" data-key="'+e(key)+'">'
          +'<div class="check-box'+(done?' done':'')+'"></div>'
          +'<div style="flex:1"><div class="check-label'+(done?' done':'')+'">'+e(item.l)
          +(item.x?' <span class="badge b-critical">critical</span>':'')+'</div>'
          +(item.n?'<span class="check-note">'+e(item.n)+'</span>':'')+'</div>'
          +'<button class="check-del" data-delck="'+e(key)+'">✕</button>'
          +'</div>';
      });
      html+='<div class="add-check-row">'
        +'<input class="edit-field" placeholder="Add item..." data-addsec="'+e(tk+'||'+sec.section)+'" style="margin-bottom:0">'
        +'<button class="small-btn amber" data-addck="'+e(tk+'||'+sec.section)+'">Add</button>'
        +'</div></div>';
    });
    html+='</div>';
  });

  el.innerHTML=html;

  el.querySelectorAll('.check-tab').forEach(function(tab){
    tap(tab,function(){
      ST.checkTab=tab.getAttribute('data-ck');
      el.querySelectorAll('.check-tab').forEach(function(t){t.classList.toggle('active',t===tab);});
      el.querySelectorAll('.check-panel').forEach(function(p){p.classList.toggle('active',p.id==='ckp-'+ST.checkTab);});
    });
  });

  el.querySelectorAll('.check-item').forEach(function(item){
    tap(item,function(ev){
      if(ev.target.classList.contains('check-del'))return;
      var key=item.getAttribute('data-key');
      var box=item.querySelector('.check-box');
      var lbl=item.querySelector('.check-label');
      var done=!box.classList.contains('done');
      box.classList.toggle('done',done);lbl.classList.toggle('done',done);
      var ch=getChecks(ST.tripId);ch[key]=done;saveChecks(ST.tripId,ch);
      updateProg(el);
    });
  });

  el.querySelectorAll('[data-delck]').forEach(function(btn){
    tap(btn,function(){
      var ch=getChecks(ST.tripId);delete ch[btn.getAttribute('data-delck')];saveChecks(ST.tripId,ch);
      btn.closest('.check-item').remove();updateProg(el);
    });
  });

  el.querySelectorAll('[data-addck]').forEach(function(btn){
    tap(btn,function(){
      var sk=btn.getAttribute('data-addck');
      var input=el.querySelector('[data-addsec="'+sk+'"]');
      var val=input.value.trim();if(!val)return;
      var key=sk+'||custom||'+Date.now();
      var div=document.createElement('div');
      div.className='check-item';div.setAttribute('data-key',key);
      div.innerHTML='<div class="check-box"></div>'
        +'<div style="flex:1"><div class="check-label">'+e(val)+'</div></div>'
        +'<button class="check-del" data-delck="'+e(key)+'">✕</button>';
      btn.closest('.add-check-row').before(div);
      tap(div,function(ev){
        if(ev.target.classList.contains('check-del')){
          var ch=getChecks(ST.tripId);delete ch[key];saveChecks(ST.tripId,ch);div.remove();updateProg(el);return;
        }
        var box=div.querySelector('.check-box');var lbl=div.querySelector('.check-label');
        var done=!box.classList.contains('done');
        box.classList.toggle('done',done);lbl.classList.toggle('done',done);
        var ch=getChecks(ST.tripId);ch[key]=done;saveChecks(ST.tripId,ch);updateProg(el);
      });
      input.value='';updateProg(el);
    });
  });

  tap(document.getElementById('cl-reset'),function(){
    saveChecks(ST.tripId,{});
    el.querySelectorAll('.check-box').forEach(function(b){b.classList.remove('done');});
    el.querySelectorAll('.check-label').forEach(function(l){l.classList.remove('done');});
    updateProg(el);
  });
  updateProg(el);
}

function updateProg(el){
  var all=el.querySelectorAll('.check-item');
  var done=el.querySelectorAll('.check-box.done');
  var pct=all.length?Math.round(done.length/all.length*100):0;
  var fill=document.getElementById('prog-fill');
  var lbl=document.getElementById('prog-lbl');
  if(fill)fill.style.width=pct+'%';
  if(lbl)lbl.textContent=done.length+' of '+all.length+' checked';
}

// ── Edit day ──────────────────────────────────────────────
function openEditDay(dayId,secId,data){
  var secIdx=data.sections.findIndex(function(s){return s.id===secId;});
  var sec=data.sections[secIdx];
  var dayIdx=sec.days.findIndex(function(d){return d.id===dayId;});
  var day=sec.days[dayIdx];
  ST.editSecIdx=secIdx;ST.editDayIdx=dayIdx;
  document.getElementById('modal-day-title').textContent='Edit Day';
  document.getElementById('ed-date').value=day.date||'';
  document.getElementById('ed-title').value=day.title||'';
  document.getElementById('ed-miles').value=day.miles||'';
  document.getElementById('ed-hotel').value=day.hotel||'';
  renderEditStops(day.stops||[]);
  openModal('modal-day');
}

function renderEditStops(stops){
  var list=document.getElementById('ed-stops');
  list.innerHTML=stops.map(function(s,i){
    return '<div class="stop-edit-row" data-si="'+i+'">'
      +'<div class="stop-edit-inputs">'
      +'<input class="edit-field sn" placeholder="Stop name" value="'+e(s.n||'')+'">'
      +'<input class="edit-field st" placeholder="Note (optional)" value="'+e(s.t||'')+'">'
      +'</div>'
      +'<button class="stop-del-btn" data-ds="'+i+'">✕</button>'
      +'</div>';
  }).join('');
  list.querySelectorAll('[data-ds]').forEach(function(btn){
    tap(btn,function(){btn.closest('.stop-edit-row').remove();});
  });
}

function getEditStops(){
  var stops=[];
  document.querySelectorAll('#ed-stops .stop-edit-row').forEach(function(row){
    var n=row.querySelector('.sn').value.trim();
    var t=row.querySelector('.st').value.trim();
    if(n)stops.push({n:n,t:t,c:'#f59e0b'});
  });
  return stops;
}

// ── Boot ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  initDefault();

  // Photo viewer close
  tap(document.getElementById('pv-close'),function(){document.getElementById('photo-viewer').classList.remove('open');});

  // New trip
  tap(document.getElementById('btn-new-trip'),function(){
    document.getElementById('modal-trip-title').textContent='New Trip';
    document.getElementById('btn-save-trip').textContent='Create Trip';
    ['nt-name','nt-from','nt-to','nt-start','nt-end','nt-tag'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('btn-save-trip')._mode='new';
    openModal('modal-trip');
  });

  tap(document.getElementById('btn-cancel-trip'),function(){closeModal('modal-trip');});

  tap(document.getElementById('btn-save-trip'),function(){
    var name=document.getElementById('nt-name').value.trim();
    var from=document.getElementById('nt-from').value.trim();
    var to=document.getElementById('nt-to').value.trim();
    var start=document.getElementById('nt-start').value.trim();
    var end=document.getElementById('nt-end').value.trim();
    var tag=document.getElementById('nt-tag').value.trim();
    if(!name||!from||!to)return;
    var btn=document.getElementById('btn-save-trip');
    if(btn._mode==='edit'&&btn._id){
      var data=getTD(btn._id);
      data.name=name;data.from=from;data.to=to;data.startDate=start;data.endDate=end;data.tagline=tag;
      saveTD(btn._id,data);
      var trips=getTrips();
      var t=trips.find(function(x){return x.id===btn._id;});
      if(t){t.name=name;t.from=from;t.to=to;t.startDate=start;t.endDate=end;}
      saveTrips(trips);
      closeModal('modal-trip');openTrip(btn._id);
    } else {
      var id='trip_'+Date.now();
      var nd={id:id,name:name,from:from,to:to,startDate:start,endDate:end,tagline:tag,
        totalMiles:'TBD',nights:0,budget:'$200/day',
        sections:[
          {id:'down',label:'Ride Down',icon:'↓',days:[]},
          {id:'base',label:'Base Camp',icon:'⬡',days:[]},
          {id:'return',label:'Return',icon:'↑',days:[]}
        ],
        checklist:{bike:[{section:'Bike',items:[]}],gear:[{section:'Gear',items:[]}],
          pack:[{section:'Packing',items:[]}],admin:[{section:'Admin',items:[]}],daily:[{section:'Daily',items:[]}]}
      };
      var trips=getTrips();
      trips.unshift({id:id,name:name,from:from,to:to,startDate:start,endDate:end});
      saveTrips(trips);saveTD(id,nd);
      closeModal('modal-trip');openTrip(id);
    }
  });

  // Edit day
  tap(document.getElementById('ed-add-stop'),function(){
    var list=document.getElementById('ed-stops');
    var row=document.createElement('div');
    row.className='stop-edit-row';
    row.innerHTML='<div class="stop-edit-inputs">'
      +'<input class="edit-field sn" placeholder="Stop name">'
      +'<input class="edit-field st" placeholder="Note (optional)">'
      +'</div><button class="stop-del-btn">✕</button>';
    tap(row.querySelector('.stop-del-btn'),function(){row.remove();});
    list.appendChild(row);
  });

  tap(document.getElementById('ed-cancel'),function(){closeModal('modal-day');});

  tap(document.getElementById('ed-save'),function(){
    var data=getTD(ST.tripId);
    var sec=data.sections[ST.editSecIdx];
    var day={
      id:ST.editDayIdx>=0?sec.days[ST.editDayIdx].id:'day_'+Date.now(),
      date:document.getElementById('ed-date').value.trim(),
      title:document.getElementById('ed-title').value.trim(),
      miles:document.getElementById('ed-miles').value.trim(),
      hotel:document.getElementById('ed-hotel').value.trim(),
      stops:getEditStops()
    };
    if(ST.editDayIdx>=0)sec.days[ST.editDayIdx]=day;
    else sec.days.push(day);
    saveTD(ST.tripId,data);
    closeModal('modal-day');
    showTab(sec.id,data);
  });

  tap(document.getElementById('ed-delete'),function(){
    if(!confirm('Delete this day?'))return;
    var data=getTD(ST.tripId);
    var sec=data.sections[ST.editSecIdx];
    sec.days.splice(ST.editDayIdx,1);
    saveTD(ST.tripId,data);
    closeModal('modal-day');
    showTab(sec.id,data);
  });

  // Share modal
  tap(document.getElementById('btn-close-share'),function(){closeModal('modal-share');});
  tap(document.getElementById('btn-copy-link'),function(){
    var url=document.getElementById('share-url').textContent;
    var btn=document.getElementById('btn-copy-link');
    if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(function(){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy Link';},2000);});
    } else {
      var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
      btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy Link';},2000);
    }
  });

  document.querySelectorAll('.modal-overlay').forEach(function(ov){
    tap(ov,function(ev){if(ev.target===ov)ov.classList.remove('open');});
  });

  renderHome();
  checkUrl();
});
})();
</script>
</body>
</html>
